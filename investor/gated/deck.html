<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlock — Built to be 1 in 10 — V27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg: #252525;
  --card: #2e2e2e;
  --card-alt: #2a2a2a;
  --green: #00c87a;
  --green-dk: #00a864;
  --green-hi: #1c5c3a;
  --white: #ffffff;
  --gray: #909499;
  --muted: #565b62;
  --red: #8b2020;
  --amber: #7a6020;
  --slide-w: 100vw;
  --slide-h: 100vh;
  --f-head: 'Barlow', sans-serif;
  --f-body: 'Barlow', sans-serif;
}

html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:var(--f-body)}

/* ── DECK ── */
.deck{
  position:fixed;inset:0;
  display:flex;align-items:stretch;
}

.slide{
  position:absolute;inset:0;
  background:var(--bg);
  display:none;flex-direction:column;
  padding:0 0 28px 0;
  opacity:0;transform:translateX(60px);
  transition:opacity .35s ease,transform .35s ease;
}
.slide.active{display:flex;opacity:1;transform:translateX(0)}
.slide.exit-left{display:flex;opacity:0;transform:translateX(-60px)}
.slide.enter-right{display:flex;opacity:0;transform:translateX(60px)}

/* ── CHROME ── */
.chrome{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 36px 0;
  flex-shrink:0;
}
.chrome-brand{font-size:10px;letter-spacing:.8px;color:var(--gray);font-weight:600}
.chrome-brand strong{color:var(--green);font-weight:700}
.chrome-num{font-size:10px;color:var(--gray);letter-spacing:.3px}

.chapter{
  padding:6px 36px 0;
  font-size:11px;font-weight:700;letter-spacing:1.2px;
  color:var(--green);text-transform:uppercase;
  flex-shrink:0;
}

.slide-title{
  padding:8px 36px 0;
  font-family:var(--f-head);font-size:clamp(22px,3.6vw,42px);
  font-weight:800;color:var(--white);line-height:1.1;
  flex-shrink:0;
}

.slide-body{flex:1;padding:0 36px;display:flex;flex-direction:column;overflow:hidden;min-height:0}

.footer{
  padding:0 36px;
  font-size:7.5px;color:var(--muted);line-height:1.4;
  flex-shrink:0;
}

/* ── NAV ── */
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:28px;background:rgba(20,20,20,.9);
  display:flex;align-items:center;justify-content:center;gap:16px;
  z-index:100;
}
.nav-btn{
  background:none;border:none;cursor:pointer;
  color:var(--gray);font-size:14px;padding:4px 10px;
  transition:color .2s;
}
.nav-btn:hover{color:var(--green)}
.slide-counter{font-size:11px;color:var(--gray);min-width:60px;text-align:center;letter-spacing:.3px}
.progress-track{flex:1;max-width:300px;height:2px;background:rgba(255,255,255,.1);border-radius:1px}
.progress-fill{height:100%;background:var(--green);border-radius:1px;transition:width .3s ease}

/* ── COMMON PARTS ── */
.green{color:var(--green)}
.white{color:var(--white)}
.gray{color:var(--gray)}
.italic{font-style:italic}
.bold{font-weight:700}

.accent-bar{width:44px;height:4px;background:var(--green);border-radius:2px;margin:10px 0 6px}
.vbar-item{display:flex;align-items:center;gap:14px;flex:1}
.vbar{width:5px;flex-shrink:0;align-self:stretch;background:var(--green);border-radius:2px}
.vbar-text{font-size:clamp(14px,1.8vw,20px);color:var(--white);font-weight:500}

.card{background:var(--card);border-radius:6px;overflow:hidden}
.card-inner{padding:18px 20px 16px}

.green-square{width:20px;height:20px;background:var(--green);border-radius:2px;flex-shrink:0}
.green-badge{
  background:var(--green);color:var(--bg);
  font-size:10px;font-weight:700;letter-spacing:1.2px;
  text-align:center;padding:7px 10px;
}

.stat-num{font-size:clamp(36px,6vw,72px);font-weight:800;color:var(--green);line-height:1}
.stat-label{font-size:clamp(11px,1.2vw,14px);color:var(--white);margin-top:4px;line-height:1.3}

/* table */
.data-table{width:100%;border-collapse:collapse}
.data-table th{background:var(--card);padding:8px 10px;font-size:10px;letter-spacing:.8px;color:var(--gray);font-weight:700;text-align:left}
.data-table td{padding:8px 10px;font-size:clamp(10px,1.1vw,13px);color:var(--white);border-bottom:1px solid rgba(255,255,255,.06)}
.data-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.data-table .green-val{color:var(--green);font-weight:700;font-size:clamp(12px,1.4vw,16px)}
.data-table .hl-row td{background:var(--green-hi)}

.risk-badge{
  display:inline-block;padding:3px 8px;border-radius:3px;
  font-size:9px;font-weight:700;letter-spacing:1px;color:#fff;
}
.risk-HIGH{background:var(--red)}
.risk-MED{background:var(--amber)}
.risk-LOW{background:var(--green-hi)}

/* ── LAYOUT HELPERS ── */
.cols{display:flex;gap:16px;flex:1;min-height:0}
.cols-3{display:flex;gap:14px;flex:1;min-height:0}
.col{flex:1;display:flex;flex-direction:column}

.spacer{flex:1}
.mt-auto{margin-top:auto}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-4{margin-bottom:4px}

/* ── SLIDE-SPECIFIC ── */

/* S1 Cover */
.cover-wrap{flex:1;display:flex;flex-direction:column;padding:0 36px;justify-content:center;position:relative}
.cover-brand{font-size:18px;font-style:italic;color:var(--green);font-weight:600;margin-bottom:8px}
.cover-h1{font-size:clamp(38px,7vw,76px);font-weight:900;line-height:1;color:var(--white)}
.cover-h1 .green{color:var(--green)}
.cover-sub1{font-size:clamp(13px,1.5vw,18px);font-style:italic;color:var(--white);margin-top:14px}
.cover-sub2{font-size:clamp(11px,1.2vw,14px);font-style:italic;color:var(--gray);margin-top:4px}
.cover-author{font-size:clamp(10px,1.1vw,12px);color:var(--gray);margin-top:14px;letter-spacing:.3px}
.cover-box{
  position:absolute;right:36px;top:50%;transform:translateY(-50%);
  width:clamp(120px,14vw,180px);aspect-ratio:0.9;
  border:2px solid var(--green);
}

/* Stats slide */
.stats-grid{display:flex;gap:0;flex:1;min-height:0}
.stat-col{flex:1;display:flex;flex-direction:column;justify-content:flex-start;padding:24px 16px 0;text-align:center}

/* Big numbered list */
.num-list{display:flex;flex-direction:column;gap:0;flex:1;min-height:0}
.num-row{
  display:flex;align-items:center;gap:20px;
  padding:12px 0;border-bottom:1px solid rgba(255,255,255,.08);
  flex:1;
}
.num-row:last-child{border-bottom:none}
.num-label{font-size:clamp(18px,2.2vw,28px);font-weight:800;color:var(--green);min-width:50px;flex-shrink:0}
.num-head{font-size:clamp(12px,1.4vw,15px);font-weight:700;color:var(--white);flex:0 0 38%;padding-right:10px}
.num-desc{font-size:clamp(11px,1.2vw,14px);color:var(--gray);flex:1}

/* Vbar list */
.vbar-list{display:flex;flex-direction:column;gap:10px;flex:1;min-height:0}

/* Quote */
.quote-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 60px}
.quote-text{font-size:clamp(17px,2.2vw,28px);font-style:italic;color:var(--white);line-height:1.4}
.quote-sub{font-size:clamp(13px,1.4vw,17px);color:var(--gray);margin-top:18px}

/* Arrow list */
.arrow-list{display:flex;flex-direction:column;gap:6px;flex:1;min-height:0}
.arrow-row{display:flex;align-items:center;gap:16px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.arrow-row:last-child{border-bottom:none}
.arrow-sector{font-size:clamp(12px,1.4vw,16px);font-weight:700;color:var(--white);flex:0 0 200px}
.arrow-sym{color:var(--green);font-size:18px;flex-shrink:0}
.arrow-ext{font-size:clamp(11px,1.3vw,15px);color:var(--white)}

/* Three cards */
.three-cards{display:flex;gap:14px;flex:1;min-height:0}
.card3{flex:1;display:flex;flex-direction:column;background:var(--card);border-radius:6px;overflow:hidden}
.card3-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:6px}
.card3-num{font-size:14px;font-weight:700;color:var(--green)}
.card3-title{font-size:clamp(13px,1.5vw,17px);font-weight:700;color:var(--white)}
.card3-desc{font-size:clamp(10px,1.1vw,13px);color:var(--gray);line-height:1.4;flex:1}
.card3-note{font-size:clamp(9px,1vw,12px);color:var(--gray);font-style:italic}

/* AI native compare */
.compare-table{display:flex;gap:12px;flex:1;min-height:0}
.compare-col{flex:1;display:flex;flex-direction:column;border-radius:6px;overflow:hidden}
.compare-header{padding:10px 16px;text-align:center;font-size:12px;font-weight:700;letter-spacing:1px}
.compare-header.adopting{background:var(--card);color:var(--gray)}
.compare-header.native{background:var(--green);color:var(--bg)}
.compare-sub{padding:8px 16px;text-align:center;font-size:12px;font-style:italic}
.compare-sub.adopting{background:#292929;color:var(--gray)}
.compare-sub.native{background:var(--green-dk);color:var(--bg)}
.compare-row{display:flex;flex:1}
.compare-cell{flex:1;padding:10px 16px;display:flex;align-items:center;font-size:clamp(11px,1.2vw,14px)}
.compare-cell.adopting{background:var(--card-alt);color:var(--gray)}
.compare-cell.native{background:var(--green);color:var(--bg);font-weight:600}
.compare-cell.native:nth-child(odd){background:var(--green-dk)}
.compare-footer{font-size:10px;font-style:italic;text-align:center;padding:8px 16px}
.compare-footer.adopting{background:#292929;color:var(--gray)}
.compare-footer.native{background:#006040;color:var(--green)}

/* Agent table */
.agent-table{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0}
.agent-row{display:flex;align-items:center;gap:16px;background:var(--card);border-radius:5px;padding:12px 18px}
.agent-tier{font-size:clamp(16px,2vw,24px);font-weight:800;color:var(--green);min-width:30px}
.agent-name{font-size:clamp(11px,1.2vw,14px);font-weight:700;color:var(--white);min-width:120px}
.agent-count{font-size:clamp(11px,1.2vw,14px);color:var(--green);min-width:90px}
.agent-func{font-size:clamp(10px,1.1vw,13px);color:var(--gray)}

/* Arch steps */
.arch-steps{display:flex;flex-direction:column;gap:6px;flex:1;min-height:0}
.arch-row{display:flex;align-items:center;gap:14px;padding:8px 14px;border-radius:5px}
.arch-row.final{background:var(--green-hi)}
.arch-num{font-size:14px;font-weight:700;color:var(--green);min-width:22px;text-align:center}
.arch-tier{background:var(--green);color:var(--bg);font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;min-width:40px;text-align:center;flex-shrink:0}
.arch-action{font-size:clamp(11px,1.2vw,14px);color:var(--gray)}
.arch-row.final .arch-action{color:var(--white)}

/* Quadrant */
.quad-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:10px;flex:1;min-height:0}
.quad-cell{display:flex;align-items:center;justify-content:center;border-radius:5px;text-align:center;padding:12px}
.quad-cell.green-cell{background:var(--green)}
.quad-cell .cell-title{font-size:clamp(16px,2.2vw,28px);font-weight:800}
.quad-cell .cell-sub{font-size:12px;font-style:italic;margin-top:4px}
.quad-row-label{writing-mode:horizontal-tb;font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--gray);margin-bottom:6px;text-align:left}

/* Founding round */
.round-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 24px;flex:1;align-content:start}
.round-term{display:flex;flex-direction:column;gap:4px;padding-top:8px}
.round-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--green)}
.round-val{font-size:clamp(22px,3vw,34px);font-weight:800;color:var(--white);line-height:1.1}
.round-sub{font-size:11px;font-style:italic;color:var(--gray)}

/* SEIS/EIS cards */
.scheme-cards{display:flex;gap:14px;flex:1;min-height:0}
.scheme-card{flex:1;display:flex;flex-direction:column;border-radius:6px;overflow:hidden}
.scheme-header{background:var(--green);color:var(--bg);font-size:13px;font-weight:700;letter-spacing:.6px;padding:10px 18px}
.scheme-body{background:var(--card);flex:1;padding:14px 18px;display:flex;flex-direction:column;gap:14px}
.scheme-item-label{font-size:11px;color:var(--gray);margin-bottom:3px}
.scheme-item-val{font-size:clamp(22px,2.8vw,32px);font-weight:800;color:var(--green);line-height:1}
.scheme-note{font-size:11px;font-style:italic;color:var(--gray);margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding-top:10px}

/* Risk table */
.risk-list{display:flex;flex-direction:column;gap:6px;flex:1;min-height:0}
.risk-row{display:flex;align-items:center;gap:14px;border-radius:5px;padding:10px 14px}
.risk-head{font-size:clamp(11px,1.2vw,14px);font-weight:700;color:var(--white);flex:0 0 34%}
.risk-mit{font-size:clamp(10px,1.1vw,12px);color:var(--gray);flex:1}

/* Engine flow */
.engine-flow{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-shrink:0;padding-top:16px}
.engine-box{background:var(--card);border-radius:5px;padding:10px 14px;font-size:clamp(11px,1.2vw,14px);font-weight:600;color:var(--white);text-align:center;flex:1}
.engine-arrow{color:var(--green);font-size:18px;flex-shrink:0}
.engine-loop{display:flex;flex-direction:column;gap:6px;padding:10px 0}
.engine-loop-row{display:flex;justify-content:space-around}
.engine-loop-item{font-size:clamp(11px,1.2vw,14px);color:var(--gray);text-align:center}

/* Allocation rows */
.alloc-list{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0}
.alloc-row{display:flex;align-items:center;gap:16px;background:var(--card);border-radius:5px;padding:12px 18px}
.alloc-label{font-size:clamp(9px,1vw,11px);font-weight:700;letter-spacing:.8px;color:var(--green);flex:0 0 220px}
.alloc-pct{font-size:clamp(18px,2.2vw,26px);font-weight:800;color:var(--white);min-width:55px}
.alloc-amt{font-size:clamp(13px,1.4vw,16px);color:var(--green);min-width:80px}
.alloc-detail{font-size:clamp(10px,1.1vw,12px);color:var(--gray)}

/* Timeline */
.timeline-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 20px;gap:0}
.timeline-track{position:relative;display:flex;justify-content:space-between;padding:20px 0 0}
.timeline-line{position:absolute;top:9px;left:0;right:0;height:2px;background:var(--green)}
.timeline-stop{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
.timeline-dot{width:18px;height:18px;background:var(--green);border-radius:50%;z-index:1;flex-shrink:0}
.timeline-stage{font-size:11px;font-weight:700;color:var(--green);text-align:center;letter-spacing:.3px}
.timeline-desc{font-size:clamp(12px,1.3vw,15px);color:var(--white);text-align:center;line-height:1.3}

/* Platform comparison table */
.platform-table{display:flex;flex-direction:column;gap:5px;flex:1;min-height:0}
.platform-row{display:flex;align-items:center;gap:12px;border-radius:4px;padding:8px 14px}
.platform-name{font-size:clamp(11px,1.2vw,14px);font-weight:600;color:var(--white);flex:0 0 200px}
.platform-subs{font-size:clamp(14px,1.6vw,18px);font-weight:700;min-width:90px;text-align:right;margin-right:8px}
.platform-seg{font-size:clamp(10px,1.1vw,13px);color:var(--gray)}
.platform-row.hl-row{background:var(--green-hi)}
.platform-row.hl-row .platform-name,.platform-row.hl-row .platform-subs{color:var(--green)}

/* Sandbox steps */
.sandbox-cards{display:flex;gap:12px;flex:1;min-height:0}
.sbox{flex:1;display:flex;flex-direction:column;background:var(--card);border-radius:6px;overflow:hidden}
.sbox-num{background:var(--green);color:var(--bg);font-size:14px;font-weight:700;text-align:center;padding:7px}
.sbox-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:8px}
.sbox-title{font-size:clamp(12px,1.4vw,16px);font-weight:700;color:var(--white)}
.sbox-desc{font-size:clamp(10px,1.1vw,13px);color:var(--gray);line-height:1.4}

/* Investor table (slide 15) */
.investor-list{display:flex;flex-direction:column;gap:7px;flex:1;min-height:0}
.investor-row{display:flex;align-items:center;gap:14px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.investor-row:last-child{border-bottom:none}
.inv-vbar{width:5px;flex-shrink:0;align-self:stretch;background:var(--green);border-radius:2px}
.inv-name{font-size:clamp(11px,1.3vw,15px);font-weight:700;color:var(--white);flex:0 0 170px}
.inv-profile{font-size:clamp(9px,1vw,12px);color:var(--gray);flex:0 0 240px;line-height:1.3}
.inv-validates{font-size:clamp(9px,1vw,12px);color:var(--white);font-style:italic;flex:1;line-height:1.3}

/* Tony steps */
.tony-steps{display:flex;flex-direction:column;gap:10px;flex:1;min-height:0}
.tony-row{display:flex;align-items:center;gap:16px}
.tony-num{font-size:clamp(18px,2vw,24px);font-weight:800;color:var(--green);min-width:36px}
.tony-text{font-size:clamp(13px,1.5vw,18px);color:var(--white)}

/* Section lists (Unlock Access) */
.section-list{display:flex;flex-direction:column;gap:16px;flex:1;min-height:0}
.sec-label{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--green);margin-bottom:4px}
.sec-body{font-size:clamp(12px,1.4vw,16px);color:var(--white);line-height:1.4}
.sec-sub{font-size:clamp(11px,1.2vw,14px);color:var(--gray);font-style:italic;margin-top:3px}

/* Disruptor */
.disruptor-boxes{display:flex;gap:10px;margin-top:12px}
.disruptor-box{flex:1;background:var(--card);border-radius:5px;padding:14px;text-align:center;display:flex;flex-direction:column;gap:6px}
.disruptor-box.hl{background:var(--green-hi)}
.disruptor-co{font-size:clamp(13px,1.5vw,18px);font-weight:800;color:var(--white)}
.disruptor-box.hl .disruptor-co{color:var(--green)}
.disruptor-mkt{font-size:clamp(11px,1.2vw,14px);color:var(--gray)}

/* Moat items */
.moat-list{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0}
.moat-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.moat-label{font-size:clamp(14px,1.6vw,18px);font-weight:700;color:var(--white);min-width:130px}
.moat-detail{font-size:clamp(12px,1.3vw,15px);color:var(--gray)}

/* Funnel table */
.funnel-list{display:flex;flex-direction:column;gap:6px;flex:1;min-height:0}
.funnel-row{display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:4px}
.funnel-stage{font-size:clamp(12px,1.3vw,15px);color:var(--white);flex:0 0 250px}
.funnel-rate{font-size:clamp(16px,2vw,22px);font-weight:800;color:var(--green);min-width:80px;text-align:center}
.funnel-desc{font-size:clamp(11px,1.2vw,13px);color:var(--gray)}

/* Value table */
.value-table-wrap{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.vtable-header{display:flex;gap:8px;background:var(--card);border-radius:4px;padding:8px 12px}
.vtable-col{flex:1;font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--gray)}
.vtable-row{display:flex;gap:8px;padding:10px 12px;border-radius:4px}
.vtable-row.plan{background:var(--green-hi)}
.vtable-row.market{background:var(--card-alt)}
.vtable-cell{flex:1;font-size:clamp(11px,1.3vw,15px);color:var(--white)}

const deck = document.getElementById('deck');
slides.forEach((html, i) => {
  const el = document.createElement('div');
  el.className = 'slide';
  el.id = `slide-${i+1}`;
  el.innerHTML = html;
  deck.appendChild(el);
});

// ── State & Navigation ───────────────────────────────────────────────────
let current = 0;
let animating = false;

function goTo(idx) {
  if (animating || idx === current || idx < 0 || idx >= TOTAL) return;
  animating = true;

  const prev = deck.children[current];
  const next = deck.children[idx];
  const forward = idx > current;

  // Setup incoming
  next.style.display = 'flex';
  next.style.opacity = '0';
  next.style.transform = `translateX(${forward ? 60 : -60}px)`;
  next.style.transition = 'none';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      next.style.transition = 'opacity .32s ease, transform .32s ease';
      next.style.opacity = '1';
      next.style.transform = 'translateX(0)';

      prev.style.transition = 'opacity .32s ease, transform .32s ease';
      prev.style.opacity = '0';
      prev.style.transform = `translateX(${forward ? -60 : 60}px)`;

      setTimeout(() => {
        prev.style.display = 'none';
        prev.style.opacity = '';
        prev.style.transform = '';
        prev.style.transition = '';
        next.style.transition = '';
        current = idx;
        updateUI();
        animating = false;
      }, 340);
    });
  });
}

function updateUI() {
  document.getElementById('counter').textContent = `${current + 1} / ${TOTAL}`;
  document.getElementById('progress').style.width = `${((current + 1) / TOTAL) * 100}%`;
}

// Init first slide
deck.children[0].style.display = 'flex';
deck.children[0].style.opacity = '1';
deck.children[0].style.transform = 'translateX(0)';
updateUI();

document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('next').addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown') { e.preventDefault(); goTo(current + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goTo(current - 1); }
});

// Click to advance / go back (click right half = forward, left half = back)
deck.addEventListener('click', e => {
  const x = e.clientX / window.innerWidth;
  if (x > 0.6) goTo(current + 1);
  else if (x < 0.4) goTo(current - 1);
});

// Swipe
let touchX = null;
deck.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
deck.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
  touchX = null;
});
</script>
