<!-- @dsCard group="Colors" viewport="700x180" subtitle="Near-black surface stack (dark theme)" name="Surfaces" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--u-bg-deep);font-family:var(--u-font-body);padding:20px;display:flex;gap:14px;flex-wrap:wrap}
  .sw{width:150px}
  .chip{height:64px;border-radius:8px;border:1px solid rgba(255,255,255,0.08)}
  .n{color:var(--u-text);font-size:12px;font-weight:500;margin-top:8px}
  .h{color:var(--u-text-faint);font-size:11px;font-family:var(--u-font-serif);margin-top:2px}
</style></head><body>
  <div class="sw"><div class="chip" style="background:var(--u-bg-deepest)"></div><div class="n">Deepest / footer</div><div class="h">#1A1A1A</div></div>
  <div class="sw"><div class="chip" style="background:var(--u-bg-deep)"></div><div class="n">Deep / hero</div><div class="h">#1F1F1F</div></div>
  <div class="sw"><div class="chip" style="background:var(--u-bg)"></div><div class="n">Section</div><div class="h">#2B2B2B</div></div>
  <div class="sw"><div class="chip" style="background:var(--u-surface)"></div><div class="n">Raised chip</div><div class="h">#333333</div></div>
  <div class="sw"><div class="chip" style="background:transparent;border:1px solid var(--u-border)"></div><div class="n">Card fill + border</div><div class="h">white 3% / 9%</div></div>
</body></html>
