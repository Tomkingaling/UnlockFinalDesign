<!-- @dsCard group="Spacing" viewport="700x200" subtitle="Gradient text, divider, grid pulse, glow" name="Signature effects" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--u-bg-deep);font-family:var(--u-font-body);padding:24px;color:var(--u-text)}
  .lab{font-size:11px;color:var(--u-text-faint);margin:14px 0 6px}
  .glow{display:inline-block;background:var(--u-green);color:var(--u-on-green);font-weight:600;font-size:13px;padding:11px 22px;border-radius:6px;box-shadow:var(--u-shadow-cta)}
  .grid{position:relative;height:54px;width:200px;display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:repeat(4,1fr);gap:2px;opacity:0.5}
  .on{background:var(--u-green);border-radius:1px;animation:u-gridpulse 4s ease-in-out infinite}
</style></head><body>
  <div style="font-size:30px;font-weight:300" class="u-grad-green">Gradient-green</div>
  <div class="lab">SECTION DIVIDER</div>
  <div class="u-divider"></div>
  <div style="display:flex;gap:40px;align-items:flex-end;margin-top:16px">
    <div><div class="lab">CTA GLOW (hover)</div><span class="glow">Join the waiting list</span></div>
    <div><div class="lab">GRID PULSE</div>
      <div class="grid"><div class="on"></div><div></div><div></div><div></div><div></div><div class="on" style="animation-delay:1s"></div><div></div><div></div><div></div><div class="on" style="animation-delay:2s"></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
    </div>
  </div>
</body></html>
