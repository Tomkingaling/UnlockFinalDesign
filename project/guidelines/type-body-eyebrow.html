<!-- @dsCard group="Type" viewport="700x210" subtitle="Eyebrow, body, lead, serif, numerals" name="Body, eyebrow & numerals" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--u-bg);font-family:var(--u-font-body);padding:26px;color:var(--u-text)}
  .eyebrow{color:var(--u-green);font-size:12px;font-weight:500;letter-spacing:0.25em;text-transform:uppercase;margin:0 0 12px}
  .lead{font-size:20px;color:var(--u-text-muted);margin:0 0 10px}
  .body{font-size:14px;color:var(--u-text-muted);line-height:1.6;margin:0 0 14px;max-width:560px}
  .serif{font-family:var(--u-font-serif);font-size:13px;color:var(--u-text-faint);font-style:italic}
  .num{font-variant-numeric:tabular-nums;color:var(--u-green);font-weight:300;font-size:30px}
</style></head><body>
  <p class="eyebrow">What you get</p>
  <p class="lead">Lead — Inter 400, 20px, muted.</p>
  <p class="body">Body copy is Inter 14–16px at 1.6 line-height in white-50%. Short, declarative, UK spelling — "optimise", "modelling".</p>
  <span class="num">£2,945,000</span> &nbsp;<span class="serif">Noto Serif — reserved for pull-quotes & compliance.</span>
</body></html>
