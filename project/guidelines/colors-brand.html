<!-- @dsCard group="Colors" viewport="700x180" subtitle="Brand green — the only chromatic colour" name="Brand green" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--u-bg-deep);font-family:var(--u-font-body);padding:20px;display:flex;gap:14px;flex-wrap:wrap}
  .sw{width:150px}
  .chip{height:64px;border-radius:8px;border:1px solid rgba(255,255,255,0.08)}
  .n{color:var(--u-text);font-size:12px;font-weight:500;margin-top:8px}
  .h{color:var(--u-text-faint);font-size:11px;font-family:var(--u-font-serif);margin-top:2px}
</style></head><body>
  <div class="sw"><div class="chip" style="background:var(--u-green)"></div><div class="n">Green</div><div class="h">#00bb77</div></div>
  <div class="sw"><div class="chip" style="background:var(--u-green-deep)"></div><div class="n">Green deep</div><div class="h">#018A56</div></div>
  <div class="sw"><div class="chip" style="background:var(--u-green-accent)"></div><div class="n">Green accent</div><div class="h">#008A55</div></div>
  <div class="sw"><div class="chip" style="background:var(--u-green-fill-strong)"></div><div class="n">Green fill</div><div class="h">12% green</div></div>
  <div class="sw"><div class="chip" style="background:var(--u-green-line)"></div><div class="n">Green line</div><div class="h">20% green</div></div>
</body></html>
