<!-- @dsCard group="Components" viewport="700x250" subtitle="SectionHeader + PullQuote (Noto Serif)" name="SectionHeader & PullQuote" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--u-bg-deep);font-family:var(--u-font-body);padding:26px;color:var(--u-text);display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:center}
  .eyebrow{color:var(--u-green);font-size:12px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;margin:0 0 14px}
  h2{font-size:30px;font-weight:300;letter-spacing:-.01em;line-height:1.12;margin:0}
  .lead{font-size:16px;color:var(--u-text-muted);line-height:1.6;margin:18px 0 0}
  .quote{font-family:var(--u-font-serif);font-style:italic;font-size:20px;line-height:1.5;margin:0}
  .cap{display:flex;align-items:center;gap:10px;margin-top:16px}
  .ava{width:36px;height:36px;border-radius:50%;background:var(--u-green-fill-strong);border:1px solid rgba(0,187,119,.2);color:var(--u-green);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
  .nm{font-size:13px;font-weight:600} .rl{font-size:12px;color:var(--u-text-faint)}
</style></head><body>
  <div>
    <p class="eyebrow">The opportunity</p>
    <h2>The rules are changing.<br>Your portfolio should too.</h2>
    <p class="lead">From April 2026, AIM-listed shares held for IHT relief will be capped at £1M per person.</p>
  </div>
  <div>
    <blockquote class="quote">“Finally, one place that shows my whole estate — and exactly what HMRC will take.”</blockquote>
    <div class="cap"><span class="ava">DH</span><span><span class="nm" style="display:block">David H.</span><span class="rl">Legacy builder</span></span></div>
  </div>
</body></html>
