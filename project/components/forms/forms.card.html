<!-- @dsCard group="Components" viewport="700x180" subtitle="Labelled input + select, green focus" name="Field" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--u-bg-deep);font-family:var(--u-font-body);padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:18px;color:var(--u-text)}
  label{display:block;font-size:12px;color:var(--u-text-muted);margin-bottom:6px}
  .ctrl{width:100%;padding:12px 16px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);color:var(--u-text);font-size:14px;font-family:inherit;box-sizing:border-box}
  .ctrl.focus{border-color:rgba(0,187,119,0.5)}
  .ph{color:var(--u-text-faint)}
</style></head><body>
  <div><label>Full name</label><div class="ctrl"><span class="ph">James Harrington</span></div></div>
  <div><label>Email (focused)</label><div class="ctrl focus">james@example.com</div></div>
  <div><label>Approximate portfolio size</label><div class="ctrl">£1M – £3M ▾</div></div>
  <div><label>Message</label><div class="ctrl"><span class="ph">Tell us more…</span></div></div>
</body></html>
