<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--u-bg-deep);font-family:var(--u-font-body);padding:26px;color:var(--u-text);display:flex;align-items:center}
  .wrap{max-width:480px}
  h3{font-family:var(--u-font-heading);font-weight:300;font-size:26px;letter-spacing:-.01em;margin:0 0 16px}
  .row{display:flex;gap:8px}
  .f{flex:1;padding:13px 16px;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);color:var(--u-text-faint);font-size:14px}
  .b{background:var(--u-green);color:var(--u-on-green);font-weight:600;font-size:14px;border-radius:6px;padding:13px 24px}
  .n{font-size:12px;color:var(--u-text-faint);margin:10px 0 0}
</style></head><body>
  <div class="wrap">
    <h3>Join the waiting list</h3>
    <div class="row"><div class="f">you@example.com</div><div class="b">Join</div></div>
    <p class="n">No commitment — priority access at launch.</p>
  </div>
</body></html>
